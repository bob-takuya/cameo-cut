<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0"/>
      <stop offset="100%" style="stop-color:#9E9E9E"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="64" ry="64" fill="url(#bg)"/>

  <!-- Cutting mat grid lines -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.2">
    <line x1="128" y1="80" x2="128" y2="432"/>
    <line x1="224" y1="80" x2="224" y2="432"/>
    <line x1="320" y1="80" x2="320" y2="432"/>
    <line x1="416" y1="80" x2="416" y2="432"/>
    <line x1="80" y1="128" x2="432" y2="128"/>
    <line x1="80" y1="224" x2="432" y2="224"/>
    <line x1="80" y1="320" x2="432" y2="320"/>
    <line x1="80" y1="416" x2="432" y2="416"/>
  </g>

  <!-- Cut path (star shape) -->
  <polygon
    points="256,120 290,200 380,200 310,260 335,350 256,300 177,350 202,260 132,200 222,200"
    fill="none"
    stroke="#FFEB3B"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Cutter blade -->
  <g transform="translate(340, 140) rotate(45)">
    <!-- Blade holder -->
    <rect x="-12" y="-60" width="24" height="50" rx="4" fill="#424242"/>
    <!-- Blade tip -->
    <polygon points="0,20 -10,-10 10,-10" fill="url(#blade)"/>
    <!-- Grip rings -->
    <rect x="-14" y="-55" width="28" height="4" rx="2" fill="#616161"/>
    <rect x="-14" y="-45" width="28" height="4" rx="2" fill="#616161"/>
  </g>

  <!-- DXF text badge -->
  <rect x="80" y="380" width="80" height="36" rx="8" fill="#ffffff"/>
  <text x="120" y="406" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565C0" text-anchor="middle">DXF</text>
</svg>
